<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Acceso administrativo de Odontologia Integral.">
  <title>Acceso Administrativo | Odontologia Integral</title>
  <link rel="stylesheet" href="styles.css?v=20260627-3">
</head>
<body>
  <main class="app-shell">
    <section class="login-view" aria-labelledby="admin-login-title">
      <div class="brand-block">
        <span class="brand-mark" aria-hidden="true">OI</span>
        <div>
          <strong>Odontologia Integral</strong>
          <span>Acceso Administrativo</span>
        </div>
      </div>

      <form class="auth-card" id="admin-login-form" novalidate>
        <div class="auth-card__header">
          <p class="eyebrow">Personal autorizado</p>
          <h1 id="admin-login-title">Iniciar sesion</h1>
          <p>Acceso para recepcion, odontologos y administracion.</p>
        </div>

        <div class="form-row">
          <label for="admin-email">Correo electronico</label>
          <input id="admin-email" name="email" type="email" autocomplete="username" placeholder="recepcion@odonto.local" required>
          <small class="field-error" data-error-for="admin-email"></small>
        </div>

        <div class="form-row">
          <label for="admin-password">Contrasena</label>
          <input id="admin-password" name="password" type="password" autocomplete="current-password" placeholder="Tu contrasena" required>
          <small class="field-error" data-error-for="admin-password"></small>
        </div>

        <button class="button button--primary" type="submit">Entrar</button>
        <p class="form-status" id="admin-login-status" role="status" aria-live="polite"></p>
      </form>

      <p class="support-note">
        Usa las credenciales asignadas para tu rol dentro de la clinica.
      </p>
    </section>
  </main>

  <script src="admin-login.js?v=20260627-2"></script>
</body>
</html>
