# Copia este archivo como config.properties en el servidor.
# No subas config.properties real a GitHub.

APP_ENV=production
APP_BASE_URL=https://tu-dominio.com
SERVER_PORT=8080
STATIC_FILES_DIR=public

# Usa un secreto largo, unico y privado.
AUTH_SECRET=reemplaza-esto-por-un-secreto-largo-de-al-menos-32-caracteres
AUTH_TTL_HOURS=8

# En produccion debe permanecer apagado.
INIT_DB_ENABLED=false
INIT_DB_TOKEN=reemplaza-esto-si-solo-lo-usas-temporalmente-en-staging

# Carpetas persistentes del servidor. Deben tener respaldo.
UPLOADS_DIR=/opt/odontologia-integral/uploads
CLINICAL_IMAGES_DIR=/opt/odontologia-integral/uploads/clinical-images
MAX_CLINICAL_IMAGE_MB=15

# MariaDB/RDS
DB_DRIVER=org.mariadb.jdbc.Driver
DB_URL=jdbc:mariadb://tu-host-rds-o-mariadb:3306/odonto_gral
DB_USER=odonto_app
DB_PASSWORD=reemplaza-por-password-seguro

# Odontologo usado como respaldo cuando una cita no recibe odontologoId.
DEFAULT_ODONTOLOGO_ID=1
