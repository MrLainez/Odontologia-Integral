# Configuracion general del servidor
APP_ENV=development
APP_BASE_URL=http://localhost:8080
SERVER_PORT=8080
STATIC_FILES_DIR=public
AUTH_SECRET=cambia-este-secreto-en-produccion
AUTH_TTL_HOURS=8
INIT_DB_ENABLED=false
INIT_DB_TOKEN=cambia-este-token
UPLOADS_DIR=uploads
CLINICAL_IMAGES_DIR=uploads/clinical-images
MAX_CLINICAL_IMAGE_MB=15

# Configuracion de MariaDB
DB_DRIVER=org.mariadb.jdbc.Driver
DB_URL=jdbc:mariadb://localhost:3306/odonto_gral
DB_USER=usuario
DB_PASSWORD=password

# Odontologo usado cuando una cita no recibe odontologoId
DEFAULT_ODONTOLOGO_ID=1
